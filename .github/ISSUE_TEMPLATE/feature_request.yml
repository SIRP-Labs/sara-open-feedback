name: Feature Request
description: Suggest a new feature or improvement for SARA Open
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make SARA better? We'd love to hear it! For broader discussions, consider using [Discussions > Feature Requests](https://github.com/SIRP-Labs/sara-open-feedback/discussions/categories/feature-requests) instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? What's the use case?
      placeholder: "As a SOC analyst, I need to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chat / General
        - Threat Intelligence
        - Incident Analysis
        - Detection Engineering
        - Knowledge Base
        - OmniSense Integration
        - Playbooks
        - API
        - UI / UX
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else? Screenshots, mockups, references to similar tools?
