name: Bug Report
description: Report a bug or unexpected behavior in SARA Open
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I asked SARA to analyze CVE-2024-1234, it returned..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to sara-open.sirp.io
        2. Type "..."
        3. See error
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of SARA is affected?
      options:
        - Chat / General queries
        - Threat Intelligence (CVE, IP, hash lookups)
        - Incident Analysis
        - Detection Engineering (Sigma, KQL, YARA)
        - Knowledge Base / Search
        - OmniSense Integration
        - Playbooks
        - Web Search
        - Settings / Account
        - Admin Dashboard
        - API
        - Other
    validations:
      required: true

  - type: dropdown
    id: plan
    attributes:
      label: Your plan
      options:
        - Free
        - Pro
        - Pro (BYOK)

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the issue.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information (browser, OS, connected to OmniSense, etc.)
